apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-storage-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cluster-storage-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "title": "Total Cluster Disk",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{"expr": "sum(node_filesystem_size_bytes{fstype=~\"ext4|xfs|btrfs\",mountpoint=~\"/|/var\"})", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "bytes", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}]}}}
        },
        {
          "title": "Total Disk Used",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [{"expr": "sum(node_filesystem_size_bytes{fstype=~\"ext4|xfs|btrfs\",mountpoint=~\"/|/var\"} - node_filesystem_avail_bytes{fstype=~\"ext4|xfs|btrfs\",mountpoint=~\"/|/var\"})", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "bytes", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 90}]}}}
        },
        {
          "title": "Total Disk Available",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [{"expr": "sum(node_filesystem_avail_bytes{fstype=~\"ext4|xfs|btrfs\",mountpoint=~\"/|/var\"})", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "bytes", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}]}}}
        },
        {
          "title": "Cluster Disk Usage",
          "type": "gauge",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "targets": [{"expr": "(1 - sum(node_filesystem_avail_bytes{fstype=~\"ext4|xfs|btrfs\",mountpoint=~\"/|/var\"}) / sum(node_filesystem_size_bytes{fstype=~\"ext4|xfs|btrfs\",mountpoint=~\"/|/var\"})) * 100", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 85}]}}}
        },
        {
          "title": "Per-Node Filesystem Usage %",
          "type": "bargauge",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{"expr": "(1 - node_filesystem_avail_bytes{fstype=~\"ext4|xfs|btrfs\",mountpoint=~\"/|/var\"} / node_filesystem_size_bytes{fstype=~\"ext4|xfs|btrfs\",mountpoint=~\"/|/var\"}) * 100", "legendFormat": "{{instance}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 85}]}}},
          "options": {"orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true}
        },
        {
          "title": "Per-Node Disk Size / Used / Available",
          "type": "table",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [
            {"expr": "node_filesystem_size_bytes{fstype=~\"ext4|xfs|btrfs\",mountpoint=~\"/|/var\"}", "legendFormat": "{{instance}}", "refId": "A", "format": "table", "instant": true},
            {"expr": "node_filesystem_size_bytes{fstype=~\"ext4|xfs|btrfs\",mountpoint=~\"/|/var\"} - node_filesystem_avail_bytes{fstype=~\"ext4|xfs|btrfs\",mountpoint=~\"/|/var\"}", "legendFormat": "{{instance}}", "refId": "B", "format": "table", "instant": true},
            {"expr": "node_filesystem_avail_bytes{fstype=~\"ext4|xfs|btrfs\",mountpoint=~\"/|/var\"}", "legendFormat": "{{instance}}", "refId": "C", "format": "table", "instant": true}
          ],
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "transformations": [
            {"id": "merge"},
            {"id": "organize", "options": {"excludeByName": {"Time": true, "__name__": true, "job": true, "fstype": true}, "renameByName": {"instance": "Node", "mountpoint": "Mount", "Value #A": "Total", "Value #B": "Used", "Value #C": "Available"}}}
          ]
        },
        {
          "title": "PVC Usage",
          "type": "table",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 12},
          "targets": [
            {"expr": "kubelet_volume_stats_capacity_bytes", "refId": "A", "format": "table", "instant": true},
            {"expr": "kubelet_volume_stats_used_bytes", "refId": "B", "format": "table", "instant": true},
            {"expr": "kubelet_volume_stats_available_bytes", "refId": "C", "format": "table", "instant": true}
          ],
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "transformations": [
            {"id": "merge"},
            {"id": "organize", "options": {"excludeByName": {"Time": true, "__name__": true, "job": true, "metrics_path": true, "service": true, "endpoint": true, "container": true, "instance": true, "node": true}, "renameByName": {"namespace": "Namespace", "persistentvolumeclaim": "PVC", "Value #A": "Capacity", "Value #B": "Used", "Value #C": "Available"}}}
          ]
        },
        {
          "title": "Disk Read I/O per Node",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "targets": [{"expr": "rate(node_disk_read_bytes_total[5m])", "legendFormat": "{{instance}} - {{device}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "Bps", "custom": {"fillOpacity": 10}}}
        },
        {
          "title": "Disk Write I/O per Node",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "targets": [{"expr": "rate(node_disk_written_bytes_total[5m])", "legendFormat": "{{instance}} - {{device}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "Bps", "custom": {"fillOpacity": 10}}}
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["storage", "cluster", "custom"],
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "title": "Cluster Storage Overview",
      "uid": "cluster-storage-overview",
      "version": 1
    }
