---
apiVersion: v1
kind: Namespace
metadata:
  name: forgejo-runner
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo-runner
  labels:
    app: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:6.3.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Register only if not already registered
              if [ ! -f /data/.runner ]; then
                forgejo-runner register --no-interactive \
                  --instance "$FORGEJO_INSTANCE" \
                  --token "$RUNNER_TOKEN" \
                  --name "lab-runner" \
                  --labels "ubuntu-latest:docker://node:20-bookworm"
              fi
              forgejo-runner daemon --config /data/config.yaml
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_TLS_VERIFY
              value: "1"
            - name: DOCKER_CERT_PATH
              value: /certs/client
            - name: FORGEJO_INSTANCE
              value: http://forgejo-http.forgejo.svc.cluster.local:3000
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-token
                  key: token
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: runner-config
              mountPath: /data/config.yaml
              subPath: config.yaml
            - name: docker-certs
              mountPath: /certs
              readOnly: true

        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
            - name: dind-storage
              mountPath: /var/lib/docker

      volumes:
        - name: runner-data
          emptyDir: {}
        - name: runner-config
          configMap:
            name: forgejo-runner-config
        - name: docker-certs
          emptyDir: {}
        - name: dind-storage
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo-runner
data:
  config.yaml: |
    log:
      level: info
    runner:
      capacity: 2
      timeout: 3h
