apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-secrets
  namespace: argocd
spec:
  project: lab
  source:
    repoURL: https://forgejo.lab.local/casey/gitops-infra.git
    targetRevision: main
    path: kubernetes/monitoring-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
