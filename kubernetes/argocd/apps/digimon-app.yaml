apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: digimon
  namespace: argocd
spec:
  project: lab
  source:
    repoURL: https://forgejo.lab.local/casey/gitops-infra.git
    targetRevision: main
    path: kubernetes/digimon
  destination:
    server: https://kubernetes.default.svc
    namespace: digimon
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
