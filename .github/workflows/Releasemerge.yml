---
name: Sync Branches
# This action triggers when a Pull Request
# targeting 'main' is closed and merged
on:
  pull_request:
    types:
      - closed
    branches:
      - main
jobs:
  # Job to sync 'main' back to 'Staging'
  sync-staging:
    name: ➡️ Sync main to Staging
    runs-on: ubuntu-latest
    # We only run if the PR was actually merged
    if: github.event.pull_request.merged == true
    steps:
      - name: Create Pull Request
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "main"
          destination_branch: "Staging"
          pr_title: "🤖 Sync: main -> Staging"
          pr_body: "This PR is auto-generated to sync main with Staging."
          github_token: ${{ secrets.GITHUB_TOKEN }}
  # Job to sync 'main' back to 'Development'
  sync-development:
    name: ➡️ Sync main to Development
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Create Pull Request
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "main"
          destination_branch: "Development"
          pr_title: "🤖 Sync: main -> Development"
          pr_body: "This PR is auto-generated to sync main with Development."
          github_token: ${{ secrets.GITHUB_TOKEN }}
